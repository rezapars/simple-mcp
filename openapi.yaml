openapi: 3.1.0
info:
  title: Rabo Client Assistant REST API
  version: 1.0.3
  description: REST facade for session authentication and client tools exposed by the MCP server.
servers:
  - url: http://localhost:8000
    description: Local development
  - url: https://simple-mcp-production-5bc1.up.railway.app
    description: Hosted Railway endpoint
tags:
  - name: authentication
    description: Session authentication
  - name: client-tools
    description: Authenticated client tools
paths:
  /health:
    get:
      operationId: get_health
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Service health
          content:
            application/json:
              schema:
                type: object
  /api/v1/authenticate:
    post:
      operationId: authenticate_client
      tags: [authentication]
      summary: Authenticate client session
      description: Authenticates the current in-memory session using client ID and OTP. The demo OTP is 9632.
      x-oai-isConsequential: false
      x-openai-isConsequential: false
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthenticationRequest"
            example:
              client_id: "123"
              otp: "9632"
      responses:
        "200":
          description: Authentication result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthenticationResponse"
              examples:
                success:
                  value:
                    authenticated: true
                    client_id: "123"
                    message: Authentication successful
                failure:
                  value:
                    authenticated: false
                    message: Invalid OTP
  /api/v1/client/onboarding-status:
    get:
      operationId: get_client_onboarding_status
      tags: [client-tools]
      summary: Get authenticated client onboarding status
      description: Returns onboarding status for the authenticated client in the current session.
      x-oai-isConsequential: false
      x-openai-isConsequential: false
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Client onboarding status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingStatusResponse"
        "401":
          $ref: "#/components/responses/AuthRequired"
  /api/v1/client/basic-info/{field}:
    get:
      operationId: get_client_basic_info
      tags: [client-tools]
      summary: Get authenticated client basic info
      description: Returns the requested basic field for the authenticated client in the current session.
      x-oai-isConsequential: false
      x-openai-isConsequential: false
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - name: field
          in: path
          required: true
          schema:
            type: string
            enum: [name, family]
      responses:
        "200":
          description: Client basic info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BasicInfoResponse"
        "401":
          $ref: "#/components/responses/AuthRequired"
  /api/v1/client/facility:
    get:
      operationId: get_client_facility_limit
      tags: [client-tools]
      summary: Get authenticated client facility limit
      description: Returns the client name and current facility limit in EUR for the authenticated client.
      x-oai-isConsequential: false
      x-openai-isConsequential: false
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Client facility limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientFacilityResponse"
        "401":
          $ref: "#/components/responses/AuthRequired"
  /api/v1/client/outreach-summary:
    get:
      operationId: summarize_client_outreach
      tags: [client-tools]
      summary: Summarize authenticated client outreach
      description: Summarizes outreach reasons, highlights, and questions to answer for the authenticated client.
      x-oai-isConsequential: false
      x-openai-isConsequential: false
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Client outreach summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutreachSummaryResponse"
        "401":
          $ref: "#/components/responses/AuthRequired"
components:
  parameters:
    SessionId:
      name: x-mcp-session-id
      in: header
      required: false
      description: Session key for local REST testing. Production should bind this to Microsoft Entra ID or Teams identity.
      schema:
        type: string
        examples: ["demo-session"]
  schemas:
    AuthenticationRequest:
      type: object
      required: [client_id, otp]
      properties:
        client_id:
          type: string
          examples: ["123"]
        otp:
          type: string
          examples: ["9632"]
    AuthenticationResponse:
      type: object
      required: [authenticated, message]
      properties:
        authenticated:
          type: boolean
        client_id:
          type:
            - string
            - "null"
          examples: ["123"]
        message:
          type: string
    OnboardingStatusResponse:
      type: object
      required: [client_id, status, message]
      properties:
        client_id:
          type: string
        status:
          type: string
        message:
          type: string
    BasicInfoResponse:
      type: object
      required: [client_id, field, value]
      properties:
        client_id:
          type: string
        field:
          type: string
          enum: [name, family]
        value:
          type: string
    ClientFacilityResponse:
      type: object
      required: [client_id, client_name, facility_limit_eur, currency, formatted_limit]
      properties:
        client_id:
          type: string
        client_name:
          type: string
        facility_limit_eur:
          type: integer
          minimum: 1000000
          maximum: 200000000
        currency:
          type: string
        formatted_limit:
          type: string
    OutreachItem:
      type: object
      required: [outreach_id, date, channel, reason, questions_to_answer]
      properties:
        outreach_id:
          type: string
        date:
          type: string
        channel:
          type: string
        reason:
          type: string
        questions_to_answer:
          type: array
          items:
            type: string
    OutreachSummaryResponse:
      type: object
      required: [client_id, client_name, outreach_count, questions_to_answer_count, reasons, highlights, summary, outreaches]
      properties:
        client_id:
          type: string
        client_name:
          type: string
        outreach_count:
          type: integer
        questions_to_answer_count:
          type: integer
        reasons:
          type: array
          items:
            type: string
        highlights:
          type: array
          items:
            type: string
        summary:
          type: string
        outreaches:
          type: array
          items:
            $ref: "#/components/schemas/OutreachItem"
    AuthRequiredResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          examples: [AUTH_REQUIRED]
        message:
          type: string
          examples: [Please authenticate first using client_id and OTP]
  responses:
    AuthRequired:
      description: Session is not authenticated.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AuthRequiredResponse"
          example:
            error: AUTH_REQUIRED
            message: Please authenticate first using client_id and OTP
