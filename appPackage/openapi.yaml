openapi: 3.1.0
info:
  title: Rabo Client Assistant REST API
  version: 1.0.3
  description: REST fallback for session authentication and client tools exposed by the MCP server.
servers:
  - url: https://simple-mcp-production-5bc1.up.railway.app
    description: Hosted Railway endpoint
paths:
  /api/v1/authenticate:
    post:
      operationId: authenticate_client
      summary: Authenticate client session
      x-oai-isConsequential: false
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthenticationRequest"
      responses:
        "200":
          description: Authentication result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthenticationResponse"
  /api/v1/client/onboarding-status:
    get:
      operationId: get_client_onboarding_status
      summary: Get authenticated client onboarding status
      x-oai-isConsequential: false
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Client onboarding status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingStatusResponse"
  /api/v1/client/basic-info/{field}:
    get:
      operationId: get_client_basic_info
      summary: Get authenticated client basic info
      x-oai-isConsequential: false
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - name: field
          in: path
          required: true
          schema:
            type: string
            enum: [name, family]
      responses:
        "200":
          description: Client basic info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BasicInfoResponse"
  /api/v1/client/facility:
    get:
      operationId: get_client_facility_limit
      summary: Get authenticated client facility limit
      x-oai-isConsequential: false
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Client facility limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientFacilityResponse"
  /api/v1/client/outreach-summary:
    get:
      operationId: summarize_client_outreach
      summary: Summarize authenticated client outreach
      x-oai-isConsequential: false
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Client outreach summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutreachSummaryResponse"
components:
  parameters:
    SessionId:
      name: x-mcp-session-id
      in: header
      required: false
      schema:
        type: string
  schemas:
    AuthenticationRequest:
      type: object
      required: [client_id, otp]
      properties:
        client_id:
          type: string
        otp:
          type: string
    AuthenticationResponse:
      type: object
      required: [authenticated, message]
      properties:
        authenticated:
          type: boolean
        client_id:
          type:
            - string
            - "null"
        message:
          type: string
    OnboardingStatusResponse:
      type: object
      required: [client_id, status, message]
      properties:
        client_id:
          type: string
        status:
          type: string
        message:
          type: string
    BasicInfoResponse:
      type: object
      required: [client_id, field, value]
      properties:
        client_id:
          type: string
        field:
          type: string
          enum: [name, family]
        value:
          type: string
    ClientFacilityResponse:
      type: object
      required: [client_id, client_name, facility_limit_eur, currency, formatted_limit]
      properties:
        client_id:
          type: string
        client_name:
          type: string
        facility_limit_eur:
          type: integer
        currency:
          type: string
        formatted_limit:
          type: string
    OutreachItem:
      type: object
      required: [outreach_id, date, channel, reason, questions_to_answer]
      properties:
        outreach_id:
          type: string
        date:
          type: string
        channel:
          type: string
        reason:
          type: string
        questions_to_answer:
          type: array
          items:
            type: string
    OutreachSummaryResponse:
      type: object
      required: [client_id, client_name, outreach_count, questions_to_answer_count, reasons, highlights, summary, outreaches]
      properties:
        client_id:
          type: string
        client_name:
          type: string
        outreach_count:
          type: integer
        questions_to_answer_count:
          type: integer
        reasons:
          type: array
          items:
            type: string
        highlights:
          type: array
          items:
            type: string
        summary:
          type: string
        outreaches:
          type: array
          items:
            $ref: "#/components/schemas/OutreachItem"
